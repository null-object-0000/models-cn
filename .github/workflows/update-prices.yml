name: Update model prices

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9,15,21 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-model-prices
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run collect
        env:
          LONGCAT_API_KEY: ${{ secrets.LONGCAT_API_KEY }}
      - run: npm run discover
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LONGCAT_API_KEY: ${{ secrets.LONGCAT_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      - run: npm run build
      - run: npm run check
      - run: npm run format:check
      - name: Generate update report
        id: report
        shell: bash
        run: |
          npm run report -- --base HEAD --output update-report.md --status-output update-material.txt
          material_changes=$(cat update-material.txt)
          echo "material_changes=$material_changes" >> "$GITHUB_OUTPUT"
          cat update-report.md >> "$GITHUB_STEP_SUMMARY"
          if [[ "$material_changes" == "true" ]]; then
            echo "> 检测到实质变化，将创建或更新自动 PR。" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> 本次仅刷新成功时间戳，不创建或更新 PR。" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Create or update price PR
        if: steps.report.outputs.material_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- data api.json v1/api.json; then
            echo "No pricing changes"
            exit 0
          fi
          branch="bot/update-model-prices"
          git config user.name "models-cn-bot"
          git config user.email "models-cn-bot@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add data api.json v1/api.json
          git commit -m "chore: update model prices"
          git push --force-with-lease origin "$branch"
          open_pr_count=$(gh pr list --head "$branch" --state open --json number --jq 'length')
          if [ "$open_pr_count" -eq 0 ]; then
            gh pr create --head "$branch" --title "chore: update model prices" --body-file update-report.md
          else
            pr_number=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
            gh pr edit "$pr_number" --body-file update-report.md
          fi
      - name: Assert collection health
        if: always() && steps.report.conclusion == 'success'
        run: npm run health:check
